# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_BUFFER_SIZE=2048

# IP / DHCP
CONFIG_NET_IPV6=n
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y

# Network event notifications
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048

# Enable TLS
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=2
CONFIG_NET_MAX_CONN=4

# DNS configuration
CONFIG_DNS_RESOLVER_ADDITIONAL_BUF_CTR=5
CONFIG_DNS_RESOLVER_ADDITIONAL_QUERIES=2
CONFIG_DNS_RESOLVER_MAX_SERVERS=2
CONFIG_DNS_NUM_CONCUR_QUERIES=5

# Avoid timeouts before receiving SYN-ACK from peer at default value (3000)
CONFIG_NET_SOCKETS_CONNECT_TIMEOUT=5000

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=12288
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_ZVFS_OPEN_MAX=5

# Modem
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_MODEM_KEY_MGMT=y

# Security backend
CONFIG_NORDIC_SECURITY_BACKEND=y
CONFIG_BUILD_WITH_TFM=y
CONFIG_ENTROPY_CC3XX=y

#Mender
CONFIG_MENDER_MCU_CLIENT=y
CONFIG_MENDER_SERVER_HOST_ON_PREM=y
CONFIG_MENDER_SERVER_HOST="https://eu.hosted.mender.io"
CONFIG_MENDER_PLATFORM_NET_TYPE_WEAK=y
CONFIG_MENDER_DEVICE_TYPE="nrf9151-dk-mender"
CONFIG_MENDER_LOG_LEVEL_INF=y
CONFIG_MENDER_DEPLOYMENT_LOGS=n
CONFIG_MENDER_ARTIFACT_GENERATE=y
CONFIG_MENDER_ARTIFACT_NAME="V0.1"
CONFIG_MENDER_HEAP_SIZE=16
CONFIG_MENDER_STORAGE_PARTITION_STORAGE_PARTITION=y
CONFIG_MENDER_STORAGE_NVS_SECTOR_COUNT=4
CONFIG_MENDER_SERVER_DORMANT_CERTIFICATES=n
CONFIG_MENDER_CLIENT_INVENTORY_DISABLE=n
CONFIG_MENDER_CLIENT_INVENTORY_NETWORK_INFO=n
CONFIG_MENDER_CLIENT_INVENTORY_BUILD_INFO=y
CONFIG_MENDER_FULL_PARSE_ARTIFACT=y
CONFIG_MENDER_PROVIDES_DEPENDS=y
CONFIG_MENDER_COMMIT_REQUIRE_AUTH=y
CONFIG_CJSON_LIB=y
CONFIG_PICOLIBC_IO_FLOAT=y

CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_USE_PSA_CRYPTO=n
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
# Enable AES cipher (required for GCM cipher suites)
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_ECP_C=y
# PSA crypto support (required when MBEDTLS_USE_PSA_CRYPTO is enabled)
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
# Enable GCM support via PSA crypto
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
# TODO: SECP256R1 was used as a sane default for the autogenerated key feature. Can we remove
# and reuse instead SECP384R1 (already required for the Google cert)?
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
CONFIG_MBEDTLS_ECP_NIST_OPTIM=y
CONFIG_MBEDTLS_CIPHER_CCM_ENABLED=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_MBEDTLS_SHA384=y
CONFIG_MBEDTLS_GENPRIME_ENABLED=y
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y
CONFIG_MBEDTLS_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_PK_WRITE_C=y
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=32768
CONFIG_MBEDTLS_ENTROPY_POLL_ZEPHYR=y
CONFIG_MBEDTLS_ENTROPY_C=y

CONFIG_MBEDTLS_USER_CONFIG_ENABLE=y
CONFIG_MBEDTLS_USER_CONFIG_FILE="config-tls-mender.h"

CONFIG_MBEDTLS_TLS_LIBRARY=y
CONFIG_MBEDTLS_X509_LIBRARY=y
CONFIG_MBEDTLS_MD_C=y
CONFIG_MBEDTLS_PK_C=y
CONFIG_MBEDTLS_PK_PARSE_C=y
CONFIG_MBEDTLS_PEM_WRITE_C=y
CONFIG_MBEDTLS_CTR_DRBG_ENABLED=y
CONFIG_MBEDTLS_CTR_DRBG_C=y
CONFIG_MBEDTLS_SHA256_C=y
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
# force off problematic families for TF-M
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_PSK_ENABLED=n
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=n
CONFIG_MBEDTLS_KEY_EXCHANGE_DHE_PSK_ENABLED=n
CONFIG_MBEDTLS_KEY_EXCHANGE_DHE_RSA_ENABLED=n
CONFIG_MBEDTLS_SSL_CONTEXT_SERIALIZATION=n
