name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build app
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2
        with:
          path: nrf9151-dk-mender
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: 3.12

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@5ec39f5cba83346d83a836dfed1524270c660e28 #v1.0.14
        with:
          app-path: nrf9151-dk-mender
          toolchains: arm-zephyr-eabi
          ccache-cache-key: ubuntu-22.04

      - name: Install mender-artifact
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL https://downloads.mender.io/repos/debian/gpg | sudo tee /etc/apt/trusted.gpg.d/mender.asc

          CODENAME="$(. /etc/os-release && echo "$VERSION_CODENAME")"

          echo "Using Ubuntu codename: $CODENAME"
          echo "deb [arch=$(dpkg --print-architecture)] https://downloads.mender.io/repos/workstation-tools ubuntu/$CODENAME/stable main" \
            | sudo tee /etc/apt/sources.list.d/mender.list

          sudo apt-get update
          sudo apt-get install -y mender-artifact

      - name: Verify
        run: mender-artifact --version

      - name: Build firmware
        working-directory: nrf9151-dk-mender
        shell: bash
        run: |
          west build -p always -b nrf9151dk/nrf9151/ns app

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: nrf9151dk-build
          if-no-files-found: warn #TODO Change this to error when building with mender-artifact
          path: nrf9151-dk-mender/build/app/zephyr/zephyr.mender
